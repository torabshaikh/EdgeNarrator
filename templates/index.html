<html>
<head>
    <title>Edge Narrator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            gap: 12px;
        }
        h1 { font-size: 1.4em; color: #ddd; }
        #prompt-label {
            max-width: 800px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.78em;
            color: #555;
            text-align: center;
            padding: 0 8px;
        }
        button {
            padding: 10px 24px;
            font-size: 0.95em;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
        #main {
            display: flex;
            width: 100%;
            max-width: 1400px;
            gap: 16px;
            align-items: stretch;
        }
        #video-container { flex: 2; }
        #video-container img {
            width: 100%;
            border: 2px solid #444;
            border-radius: 8px;
            display: block;
        }
        #sidebar {
            flex: 0 0 360px;
            display: flex;
            flex-direction: column;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            background: #161616;
            overflow: hidden;
        }
        #sidebar-header {
            padding: 8px 14px;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #555;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        #results-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            scroll-behavior: smooth;
        }
        #results-list::-webkit-scrollbar { width: 4px; }
        #results-list::-webkit-scrollbar-track { background: transparent; }
        #results-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .result-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 7px 10px;
            border-radius: 5px;
            font-size: 0.88em;
            line-height: 1.45;
            max-height: 90px;
            overflow: hidden;
            transition: opacity 0.6s ease, color 0.4s ease,
                        max-height 0.6s ease, padding 0.4s ease, margin 0.4s ease;
        }
        .result-item .thumb {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .result-item .label { flex: 1; min-width: 0; }
        .result-item.speaking {
            color: #00e676;
            background: #0a2016;
            border-left: 3px solid #00e676;
        }
        .result-item.pending {
            color: #fff;
            background: #1a1a2a;
            border-left: 3px solid #4a6fa5;
        }
        .result-item.recent { color: #bbb; opacity: 1; }
        .result-item.older  { color: #777; opacity: 0.6; }
        .result-item.old    { color: #444; opacity: 0.3; }
        .result-item.fading {
            opacity: 0 !important;
            max-height: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            margin: 0 !important;
        }
    </style>
</head>
<body>
    <h1>Edge Narrator</h1>
    <div id="prompt-label">{{ prompt }}</div>
    <button onclick="enableAudio()" id="btn">Click to Enable Audio</button>
    <div id="main">
        <div id="video-container">
            <img src="{{ url_for('video_feed') }}">
        </div>
        <div id="sidebar">
            <div id="sidebar-header">Scene Descriptions</div>
            <div id="results-list"></div>
        </div>
    </div>

    <script>
        let audioEnabled = false;
        let latestText = "";
        let speakingEl = null;
        let pendingEl = null;
        let isSpeaking = false;
        const MAX_ITEMS = 15;

        // Watchdog: Chrome silently pauses speechSynthesis when the tab loses
        // focus or after ~15 s. Resume it every 3 s while we expect speech.
        setInterval(() => {
            if (isSpeaking && window.speechSynthesis.paused) {
                window.speechSynthesis.resume();
            }
        }, 3000);

        function enableAudio() {
            audioEnabled = true;
            document.getElementById("btn").style.display = "none";
            if (!isSpeaking) {
                const top = document.querySelector(".result-item:not(.fading)");
                if (top) {
                    speakElement(top);
                } else {
                    // No results yet. Mobile browsers require the first speak()
                    // to be inside the gesture handler or they block it later.
                    // Speak a short audible cue to warm up the engine.
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance('Ready'));
                }
            }
        }

        function ageItems() {
            const items = document.querySelectorAll(
                ".result-item:not(.speaking):not(.pending):not(.fading)"
            );
            items.forEach((el, idx) => {
                el.className = idx === 0 ? "result-item recent"
                             : idx <= 3  ? "result-item older"
                             :             "result-item old";
            });
        }

        function fadeAndRemove(el) {
            if (el.classList.contains("fading")) return;
            el.classList.add("fading");
            setTimeout(() => {
                if (el.dataset.imgurl) URL.revokeObjectURL(el.dataset.imgurl);
                if (el.parentNode) el.remove();
            }, 700);
        }

        function speakElement(el) {
            if (!el || !audioEnabled) return;
            const list = document.getElementById("results-list");
            if (speakingEl) {
                speakingEl.classList.remove("speaking");
                speakingEl.classList.add("recent");
            }
            speakingEl = el;
            list.prepend(el);
            el.className = "result-item speaking";
            ageItems();

            isSpeaking = true;
            const u = new SpeechSynthesisUtterance(el.dataset.text);
            u.rate = 1.1;

            const onFinish = () => {
                isSpeaking = false;
                if (speakingEl === el) {
                    el.classList.remove("speaking");
                    el.classList.add("recent");
                    speakingEl = null;
                }
                ageItems();
                if (pendingEl) {
                    const next = pendingEl;
                    pendingEl = null;
                    speakElement(next);
                }
            };
            u.onend = onFinish;
            u.onerror = onFinish;
            window.speechSynthesis.speak(u);
        }

        function addResult(text, imgUrl) {
            const list = document.getElementById("results-list");
            const item = document.createElement("div");
            item.dataset.text = text;
            if (imgUrl) item.dataset.imgurl = imgUrl;

            if (imgUrl) {
                const thumb = document.createElement("img");
                thumb.className = "thumb";
                thumb.src = imgUrl;
                item.appendChild(thumb);
            }
            const label = document.createElement("span");
            label.className = "label";
            label.textContent = text;
            item.appendChild(label);

            if (audioEnabled && isSpeaking) {
                if (pendingEl) {
                    pendingEl.classList.remove("pending");
                    pendingEl.classList.add("recent");
                }
                item.className = "result-item pending";
                pendingEl = item;
                const speaking = list.querySelector(".result-item.speaking");
                speaking ? speaking.insertAdjacentElement("afterend", item) : list.prepend(item);
            } else {
                item.className = "result-item recent";
                list.prepend(item);
            }

            ageItems();
            Array.from(list.querySelectorAll(".result-item:not(.fading)"))
                .slice(MAX_ITEMS)
                .forEach(fadeAndRemove);

            if (audioEnabled && !isSpeaking) speakElement(item);
        }

        function checkStatus() {
            fetch("/status")
                .then(r => r.json())
                .then(data => {
                    const text = data.text;
                    if (text === latestText || text.length <= 2) return;
                    latestText = text;
                    fetch("/snapshot")
                        .then(r => r.blob())
                        .then(blob => addResult(text, URL.createObjectURL(blob)))
                        .catch(() => addResult(text, null));
                });
        }

        setInterval(checkStatus, 1000);
    </script>
</body>
</html>
